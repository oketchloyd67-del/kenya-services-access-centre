<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login – Kenya Services Access Centre</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 40%, #4f46e5 100%);
            padding: 20px;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 40px 36px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 25px 60px -12px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .logo-img {
            height: 48px;
            width: auto;
            object-fit: contain;
        }
        .input-group { position: relative; }
        .input-group input {
            width: 100%;
            padding: 14px 16px 14px 46px;
            border: 1.5px solid #e5e7eb;
            border-radius: 14px;
            font-size: 15px;
            background: #f9fafb;
            transition: all 0.25s ease;
            outline: none;
        }
        .input-group input:focus {
            border-color: #4f46e5;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
        }
        .input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 18px;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: #fff;
            font-weight: 600;
            font-size: 16px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 14px rgba(79, 70, 229, 0.35);
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(79, 70, 229, 0.45); }
        .btn-login:active { transform: translateY(0); }
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 14px 24px;
            border-radius: 12px;
            color: #fff;
            font-weight: 500;
            z-index: 9999;
            animation: slideUp 0.4s ease;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        }
        .toast-success { background: #059669; }
        .toast-error { background: #dc2626; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e2e8f0;
            border-top-color: #4f46e5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 480px) {
            .login-card { padding: 28px 20px; border-radius: 24px; }
            .logo-img { height: 40px; }
        }
        /* Clean login - no autofill styling */
        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus,
        input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px #f9fafb inset !important;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="flex flex-col items-center mb-6">
        <img src="../images/logo.png" alt="Kenya Services Access Centre" class="logo-img mb-3" onerror="this.style.display='none'">
        <h1 class="text-xl font-bold text-gray-800">Welcome Back</h1>
        <p class="text-sm text-gray-500">Sign in to your account</p>
    </div>

    <form id="loginForm" autocomplete="off">
        <div class="space-y-4">
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="Email address" required autocomplete="off" />
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Password" required autocomplete="new-password" />
            </div>
            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt mr-2"></i> Sign In
            </button>
        </div>
        <div class="text-center mt-2">
    <a href="reset-password.html" class="text-xs text-gray-400 hover:text-gray-600 transition">Forgot password?</a>
</div>
    </form>

    <div class="mt-5 text-center">
        <p class="text-sm text-gray-500">
            Don't have an account? 
            <a href="register.html" class="font-semibold text-indigo-600 hover:text-indigo-800 transition">Register</a>
        </p>
        <a href="#" class="text-xs text-gray-400 hover:text-gray-600 transition mt-1 inline-block">Forgot password?</a>
    </div>

    <div class="mt-4 flex justify-center gap-6 text-sm text-gray-400">
        <a href="../index.html" class="hover:text-gray-600 transition"><i class="fas fa-arrow-left mr-1"></i> Home</a>
        <span>•</span>
        <a href="#" class="hover:text-gray-600 transition">Help</a>
    </div>
</div>

<script>
    const API_BASE = 'https://kenyaservices-accesscentre-ly34.onrender.com';

    // Clear any cached login data on page load
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('email').value = '';
        document.getElementById('password').value = '';
        // Ensure no autofill persists
        setTimeout(() => {
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
        }, 100);
    });

    function showToast(msg, type = 'success') {
        const existing = document.querySelector('.toast');
        if (existing) existing.remove();
        const el = document.createElement('div');
        el.className = `toast toast-${type}`;
        el.textContent = msg;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 4000);
    }

    function showLoading(show) {
        let overlay = document.getElementById('loadingOverlay');
        if (show) {
            if (!overlay) {
                overlay = document.createElement('div');
                overlay.id = 'loadingOverlay';
                overlay.className = 'fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-[9999]';
                overlay.innerHTML = `<div class="bg-white rounded-2xl p-8 text-center shadow-2xl"><div class="spinner"></div><p class="mt-4 text-gray-600 font-medium">Signing in…</p></div>`;
                document.body.appendChild(overlay);
            }
        } else if (overlay) overlay.remove();
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();

        if (!email || !password) {
            showToast('Please enter both email and password', 'error');
            return;
        }

        showLoading(true);
        try {
            const res = await fetch(`${API_BASE}/api/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            showLoading(false);

            if (data.success) {
                localStorage.setItem('authToken', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                showToast('Login successful ✅');

                const role = data.user.role;
                const redirectMap = {
                    'admin': 'admin.html',
                    'employer': 'employer-dashboard.html',
                    'job_seeker': 'job-search.html',
                    'service_provider': 'services.html'
                };
                setTimeout(() => {
                    window.location.href = redirectMap[role] || '../index.html';
                }, 600);
            } else {
                showToast(data.message || 'Invalid credentials', 'error');
            }
        } catch (error) {
            showLoading(false);
            showToast('An error occurred. Please try again.', 'error');
        }
    });

    // Prevent back navigation to dashboard after logout
    window.addEventListener('popstate', function(event) {
        // If user tries to go back after logout, redirect to login
        if (!localStorage.getItem('authToken')) {
            window.location.href = 'login.html';
        }
    });
</script>
</body>
</html>
