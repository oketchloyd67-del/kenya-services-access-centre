<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kenya Services Access Centre</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-gray-100">

    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <h1>Kenya Services Access Centre</h1>
            </div>
            <div class="nav-links">
                <a href="../index.html">Home</a>
                <a href="employer-register.html">Register</a>
            </div>
            <button class="mobile-menu-btn" id="mobileMenuBtn">
                <i class="fas fa-bars"></i>
            </button>
        </div>
        <div class="mobile-menu" id="mobileMenu">
            <a href="../index.html">Home</a>
            <a href="employer-register.html">Register</a>
        </div>
    </nav>

    <div class="min-h-screen flex items-center justify-center py-20 px-4">
        <div class="max-w-md w-full bg-white rounded-lg shadow-lg p-8">
            <div class="text-center mb-8">
                <h2 class="text-2xl font-bold text-purple-600">Welcome Back</h2>
                <p class="text-gray-600 mt-2">Sign in to your account</p>
            </div>
            
            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-gray-700 mb-2 font-medium">Email Address</label>
                    <input type="email" id="email" required class="form-input w-full" placeholder="Enter your email">
                </div>
                
                <div>
                    <label class="block text-gray-700 mb-2 font-medium">Password</label>
                    <input type="password" id="password" required class="form-input w-full" placeholder="Enter your password">
                </div>
                
                <button type="submit" class="btn-primary w-full py-3">
                    <i class="fas fa-sign-in-alt mr-2"></i> Sign In
                </button>
            </form>
            
            <div class="mt-6 text-center">
                <p class="text-gray-600">
                    Don't have an account? 
                    <a href="employer-register.html" class="text-purple-600 hover:underline font-medium">Register here</a>
                </p>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-container">
            <div class="footer-bottom">
                <p>&copy; 2024 Kenya Services Access Centre. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script>
        // Mobile menu toggle
        document.getElementById('mobileMenuBtn').addEventListener('click', () => {
            document.getElementById('mobileMenu').classList.toggle('active');
        });
        
        // Show notification function
        function showNotification(message, type) {
            const toast = document.createElement('div');
            toast.className = `toast ${type || 'success'}`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'} mr-2"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // Show loading function
        function showLoading(show) {
            let overlay = document.getElementById('loadingOverlay');
            if (show) {
                if (!overlay) {
                    overlay = document.createElement('div');
                    overlay.id = 'loadingOverlay';
                    overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:9999';
                    overlay.innerHTML = '<div style="background:white;padding:20px;border-radius:10px;"><div class="spinner"></div><p class="mt-2">Processing...</p></div>';
                    document.body.appendChild(overlay);
                }
            } else {
                if (overlay) overlay.remove();
            }
        }
        
        // Login form submission
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            showLoading(true);
            
            try {
                const response = await fetch('https://kenyaServices-AccessCentre.onrender.com/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                showLoading(false);
                
                if (data.success) {
                    localStorage.setItem('authToken', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showNotification('Login successful!', 'success');
                    
                    if (data.user.role === 'admin') {
                        window.location.href = 'admin.html';
                    } else if (data.user.role === 'employer') {
                        window.location.href = 'employer-dashboard.html';
                    } else if (data.user.role === 'job_seeker') {
                        window.location.href = 'job-search.html';
                    } else if (data.user.role === 'service_provider') {
                        window.location.href = 'services.html';
                    } else {
                        window.location.href = '../index.html';
                    }
                } else {
                    showNotification(data.message || 'Login failed', 'error');
                }
            } catch (error) {
                showLoading(false);
                console.error('Login error:', error);
                showNotification('An error occurred during login', 'error');
            }
        });
    </script>
</body>
</html>
