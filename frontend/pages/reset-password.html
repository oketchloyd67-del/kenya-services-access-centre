<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Kenya Services Access Centre</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #1e1b4b 0%, #4f46e5 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .reset-card { background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); border-radius: 32px; padding: 40px; max-width: 420px; width: 100%; box-shadow: 0 25px 60px -12px rgba(0,0,0,0.4); }
        .logo-img { height: 48px; width: auto; object-fit: contain; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 500; color: #4a5568; margin-bottom: 6px; font-size: 14px; }
        .form-group input { width: 100%; padding: 14px 16px; border: 1.5px solid #e2e8f0; border-radius: 12px; font-size: 15px; transition: all 0.3s; background: #f9fafb; outline: none; }
        .form-group input:focus { border-color: #4f46e5; background: white; box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
        .btn-primary { width: 100%; padding: 14px; background: linear-gradient(135deg, #4f46e5, #7c3aed); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 14px rgba(79,70,229,0.35); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(79,70,229,0.45); }
        .toast { position: fixed; bottom: 24px; right: 24px; padding: 14px 24px; border-radius: 12px; color: #fff; font-weight: 500; z-index: 9999; animation: slideUp 0.4s ease; box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
        .toast-success { background: #059669; }
        .toast-error { background: #dc2626; }
        @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        .hidden { display: none !important; }
        .spinner { width: 40px; height: 40px; border: 3px solid #e2e8f0; border-top-color: #4f46e5; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="reset-card">
    <div class="flex flex-col items-center mb-6">
        <img src="../images/logo.png" alt="Kenya Services" class="logo-img mb-3" onerror="this.style.display='none'">
        <h1 class="text-xl font-bold text-gray-800" id="pageTitle">Reset Password</h1>
        <p class="text-sm text-gray-500" id="pageSubtitle">Enter your email to receive a reset link</p>
    </div>

    <!-- Step 1: Request Reset -->
    <div id="step1">
        <form id="requestResetForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="resetEmail" required placeholder="your@email.com">
            </div>
            <button type="submit" class="btn-primary">Send Reset Link</button>
        </form>
    </div>

    <!-- Step 2: Reset Password (when token is present) -->
    <div id="step2" class="hidden">
        <form id="resetPasswordForm">
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="newPassword" required placeholder="Minimum 6 characters">
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" required placeholder="Confirm your password">
            </div>
            <button type="submit" class="btn-primary">Reset Password</button>
        </form>
    </div>

    <!-- Step 3: Success -->
    <div id="step3" class="hidden text-center">
        <i class="fas fa-check-circle text-5xl text-green-500 mb-4"></i>
        <h3 class="text-xl font-bold text-gray-800">Password Reset Successfully!</h3>
        <p class="text-gray-500 mt-2">You can now login with your new password.</p>
        <a href="login.html" class="btn-primary inline-block text-center mt-4" style="text-decoration:none;">Go to Login</a>
    </div>

    <div class="mt-6 text-center">
        <a href="login.html" class="text-sm text-gray-500 hover:text-gray-700 transition"><i class="fas fa-arrow-left mr-1"></i> Back to Login</a>
    </div>
</div>

<script>
    const API_BASE_URL = 'https://kenyaservices-accesscentre-ly34.onrender.com';

    function showToast(msg, type = 'success') {
        const existing = document.querySelector('.toast');
        if (existing) existing.remove();
        const el = document.createElement('div');
        el.className = `toast toast-${type}`;
        el.textContent = msg;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 4000);
    }

    function showLoading(show) {
        let overlay = document.getElementById('loadingOverlay');
        if (show) {
            if (!overlay) {
                overlay = document.createElement('div');
                overlay.id = 'loadingOverlay';
                overlay.className = 'fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-[9999]';
                overlay.innerHTML = `<div class="bg-white rounded-2xl p-8 text-center shadow-2xl"><div class="spinner"></div><p class="mt-4 text-gray-600 font-medium">Processing...</p></div>`;
                document.body.appendChild(overlay);
            }
        } else if (overlay) overlay.remove();
    }

    // Check if token is present in URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (token) {
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.remove('hidden');
        document.getElementById('pageTitle').textContent = 'Set New Password';
        document.getElementById('pageSubtitle').textContent = 'Create a new password for your account';
    }

    // Request Reset
    document.getElementById('requestResetForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('resetEmail').value.trim();
        showLoading(true);
        try {
            const res = await fetch(`${API_BASE_URL}/api/password/request-reset`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const data = await res.json();
            showLoading(false);
            if (data.success) {
                showToast('Reset link sent! Check your email.', 'success');
                document.getElementById('resetEmail').value = '';
            } else {
                showToast(data.message || 'Failed to send reset link', 'error');
            }
        } catch (e) { showLoading(false); showToast('An error occurred', 'error'); }
    });

    // Reset Password
    document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (newPassword !== confirmPassword) {
            showToast('Passwords do not match', 'error');
            return;
        }
        if (newPassword.length < 6) {
            showToast('Password must be at least 6 characters', 'error');
            return;
        }

        showLoading(true);
        try {
            const res = await fetch(`${API_BASE_URL}/api/password/reset`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, newPassword })
            });
            const data = await res.json();
            showLoading(false);
            if (data.success) {
                document.getElementById('step2').classList.add('hidden');
                document.getElementById('step3').classList.remove('hidden');
            } else {
                showToast(data.message || 'Failed to reset password', 'error');
            }
        } catch (e) { showLoading(false); showToast('An error occurred', 'error'); }
    });
</script>
</body>
</html>
